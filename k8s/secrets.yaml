apiVersion: v1
kind: Secret
metadata:
  name: substream-secrets
  namespace: substream
  labels:
    app: substream-backend
type: Opaque
data:
  # Redis Password (base64 encoded)
  redis-password: <BASE64_ENCODED_REDIS_PASSWORD>
  
  # S3 Credentials (base64 encoded)
  s3-access-key-id: <BASE64_ENCODED_S3_ACCESS_KEY_ID>
  s3-secret-access-key: <BASE64_ENCODED_S3_SECRET_ACCESS_KEY>
  
  # Authentication Secrets (base64 encoded)
  creator-auth-secret: <BASE64_ENCODED_CREATOR_AUTH_SECRET>
  cdn-token-secret: <BASE64_ENCODED_CDN_TOKEN_SECRET>
  
  # Soroban Configuration (base64 encoded)
  soroban-source-secret: <BASE64_ENCODED_SOROBAN_SOURCE_SECRET>
  
  # Email Configuration (base64 encoded)
  ses-api-key: <BASE64_ENCODED_SES_API_KEY>
  sendgrid-api-key: <BASE64_ENCODED_SENDGRID_API_KEY>
  
  # JWT Secrets (base64 encoded)
  jwt-secret: <BASE64_ENCODED_JWT_SECRET>
  
  # Database Encryption (base64 encoded)
  db-encryption-key: <BASE64_ENCODED_DB_ENCRYPTION_KEY>
  
  # External API Keys (base64 encoded)
  ofac-api-key: <BASE64_ENCODED_OFAC_API_KEY>
  ipinfo-api-key: <BASE64_ENCODED_IPINFO_API_KEY>
  maxmind-api-key: <BASE64_ENCODED_MAXMIND_API_KEY>
  abuseipdb-api-key: <BASE64_ENCODED_ABUSEIPDB_API_KEY>
  ipqualityscore-api-key: <BASE64_ENCODED_IPQUALITYSCORE_API_KEY>
  
  # Webhook Secrets (base64 encoded)
  webhook-signing-secret: <BASE64_ENCODED_WEBHOOK_SIGNING_SECRET>
  
  # Monitoring and Alerting (base64 encoded)
  sentry-dsn: <BASE64_ENCODED_SENTRY_DSN>
  
---
# Note: Replace <BASE64_ENCODED_*> with actual base64-encoded values
# Example: echo -n "your-secret-password" | base64
